    async function onConfigChange(config) {
      const brandEls = document.querySelectorAll('#brand-wordmark, #footer-brand, .brand-name');

      document.documentElement.style.setProperty('--secondary', config.secondary_color || defaultConfig.secondary_color);

      return {
        recolorables: [

    // ============ UTILITIES ============
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast px-4 py-3 rounded-lg shadow-lg ${type === 'error' ? 'bg-red-500' : type === 'warning' ? 'bg-amber-500' : 'bg-sage-600'} text-white text-sm font-medium`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function getUser() {
      const stored = localStorage.getItem('bba_user');
      return stored ? JSON.parse(stored) : null;
    }

    function setUser(user) {
      currentUser = user;
      localStorage.setItem('bba_user', JSON.stringify(user));
      updateNav();
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('bba_user');
      updateNav();
      navigate('landing');
      showToast('Signed out successfully');
    }

    function getUserData(type) {
      if (!currentUser) return [];
      return appData.filter(d => d.userId === currentUser.email && d.type === type);
    }

    function getStreak() {
      const checkIns = getUserData('checkin').sort((a, b) => new Date(b.date) - new Date(a.date));
      if (checkIns.length === 0) return 0;
      let streak = 0;
      let currentDate = new Date();
      currentDate.setHours(0, 0, 0, 0);
      
      for (const checkIn of checkIns) {
        const checkInDate = new Date(checkIn.date);
        checkInDate.setHours(0, 0, 0, 0);
        const diffDays = Math.floor((currentDate - checkInDate) / (1000 * 60 * 60 * 24));
        if (diffDays <= 1) {
          streak++;
          currentDate = checkInDate;
        } else {
          break;
        }
      }
      return streak;
    }

    // ============ NAVIGATION ============
    function navigate(page, params = {}) {
      let hash = '#' + page;
      if (Object.keys(params).length > 0) {
        hash += '?' + new URLSearchParams(params).toString();
      }
      window.location.hash = hash;
    }

    function getHashParams() {
      const hash = window.location.hash.slice(1);
      const [page, queryString] = hash.split('?');
      const params = queryString ? Object.fromEntries(new URLSearchParams(queryString)) : {};
      return { page: page || 'landing', params };
    }

    function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const plan = document.getElementById('signup-plan').value;
      
      const users = JSON.parse(localStorage.getItem('bba_users') || '[]');
      if (users.find(u => u.email === email)) {
        showToast('An account with this email already exists', 'error');
        return;
      }
      
      const newUser = { name, email, password, plan, joined: new Date().toISOString() };
      users.push(newUser);
      localStorage.setItem('bba_users', JSON.stringify(users));
      setUser(newUser);
      navigate('dashboard');
      showToast(`Welcome to Balancedbyaliyah, ${name}!`);
    }

    function renderRecentActivity() {
      const recent = appData
        .filter(d => d.userId === currentUser?.email)
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .slice(0, 5);
      
      if (recent.length === 0) {
        return '<p class="text-sage-500 italic">No activity yet. Start a practice to see your progress!</p>';
      }
      
      return recent.map(item => {
        let label = '';
        if (item.type === 'checkin') label = `Mood check-in: Stress ${item.stress}/10, Sleep ${item.sleep}/10`;
        else if (item.type === 'cbt') label = `CBT thought record completed`;
        else if (item.type === 'dbt') label = `DBT skill practiced: ${item.skill}`;
        else if (item.type === 'meditation') label = `Meditation: ${item.duration} minutes`;
        else if (item.type === 'breathwork') label = `Breathwork session completed`;
        else if (item.type === 'challenge') label = `Challenge progress updated`;
        
        return `
          <div class="glass-card rounded-xl p-4 flex justify-between items-center">
            <p class="text-sage-700">${label}</p>
            <p class="text-sm text-sage-500">${new Date(item.date).toLocaleDateString()}</p>
          </div>
        `;
      }).join('');
    }

    // Breathing functions
    let selectedPattern = breathPatterns[0];
    let breathPhase = 0;
    let breathSeconds = 0;

    function selectBreathPattern(patternId) {
      selectedPattern = breathPatterns.find(p => p.id === patternId);
      document.querySelectorAll('.breath-pattern-btn').forEach(btn => {
        if (btn.dataset.pattern === patternId) {
          btn.classList.add('border-sage-500', 'bg-sage-50');
        } else {
          btn.classList.remove('border-sage-500', 'bg-sage-50');
        }
      });
    }

    function startBreathing() {
      document.getElementById('breath-start-btn').classList.add('hidden');
      document.getElementById('breath-stop-btn').classList.remove('hidden');
      breathPhase = 0;
      breathSeconds = 0;
      runBreathCycle();
    }

    function runBreathCycle() {
      const phases = [
        { name: 'Inhale', duration: selectedPattern.inhale },
        { name: 'Hold', duration: selectedPattern.hold1 },
        { name: 'Exhale', duration: selectedPattern.exhale },
        { name: 'Hold', duration: selectedPattern.hold2 }
      ].filter(p => p.duration > 0);
      
      let phaseIndex = 0;
      let phaseTime = 0;
      
      breathingInterval = setInterval(() => {
        breathSeconds++;
        phaseTime++;
        
        const currentPhase = phases[phaseIndex];
        document.getElementById('breath-instruction').textContent = currentPhase.name;
        document.getElementById('breath-timer').textContent = formatTime(breathSeconds);
        
        // Animate circle
        const circle = document.getElementById('breath-circle');
        if (currentPhase.name === 'Inhale') {
          circle.style.transform = `scale(${1 + (phaseTime / currentPhase.duration) * 0.3})`;
        } else if (currentPhase.name === 'Exhale') {
          circle.style.transform = `scale(${1.3 - (phaseTime / currentPhase.duration) * 0.3})`;
        }
        
        if (phaseTime >= currentPhase.duration) {
          phaseTime = 0;
          phaseIndex = (phaseIndex + 1) % phases.length;
        }
      }, 1000);
    }

    function stopBreathing() {
      clearInterval(breathingInterval);
      document.getElementById('breath-start-btn').classList.remove('hidden');
      document.getElementById('breath-stop-btn').classList.add('hidden');
      document.getElementById('breath-instruction').textContent = 'Ready';
      document.getElementById('breath-circle').style.transform = 'scale(1)';
      
      if (breathSeconds > 30) {
        logBreathwork();
      }
    }

    async function bookRetreat(retreatId) {
      if (appData.length >= 999) {
        showToast('Storage limit reached', 'warning');
        return;
      }
      
      const result = await window.dataSdk.create({
        type: 'retreat-booking',
        userId: currentUser.email,
        date: new Date().toISOString(),
        retreatId,
        status: 'confirmed',
        prepNotes: '',
        aftercareNotes: ''
      });
      
      if (result.isOk) {
        showToast('Retreat booked! Check your email for details.');
        renderRetreatDetail();
      } else {
        showToast('Failed to book retreat', 'error');
      }
    }

    async function updateRetreatNotes(retreatId) {
      const booking = appData.find(d => d.type === 'retreat-booking' && d.retreatId === retreatId && d.userId === currentUser.email);
      if (!booking) return;
      
      const prepNotes = document.getElementById('prep-notes').value;
      const aftercareNotes = document.getElementById('aftercare-notes').value;
      
      const result = await window.dataSdk.update({
        ...booking,
        prepNotes,
        aftercareNotes
      });
      
      if (result.isOk) {
        showToast('Notes saved!');
      } else {
        showToast('Failed to save notes', 'error');
      }
    }

            ${userChallenges.length > 0 ? `

                  ${userChallenges.map(uc => {

                    return `

                          </div>
                        </div>
                        <p class="text-sage-600 text-sm mb-4">${challenge.tasks[progress] || 'Completed!'}</p>
                        ${progress < challenge.duration ? `
                          <button onclick="progressChallenge('${uc.__backendId}')" class="w-full py-2 bg-sage-600 hover:bg-sage-700 text-white text-sm font-medium rounded-lg transition-colors">Mark Day Complete</button>

            <!-- Available Challenges -->
            <div>

    async function joinChallenge(challengeId) {
      if (appData.length >= 999) {
        showToast('Storage limit reached', 'warning');
        return;
      }
      
      const result = await window.dataSdk.create({
        type: 'challenge',
        userId: currentUser.email,
        date: new Date().toISOString(),
        challengeId,
        progress: 0
      });
      
      if (result.isOk) {
        showToast('Challenge joined! Good luck!');
        renderCommunity();
      } else {
        showToast('Failed to join challenge', 'error');
      }
    }

    async function progressChallenge(backendId) {
      const challenge = appData.find(d => d.__backendId === backendId);
      if (!challenge) return;
      
      const result = await window.dataSdk.update({
        ...challenge,
        progress: (challenge.progress || 0) + 1
      });
      
      if (result.isOk) {
        showToast('Day completed! Keep going!');
      } else {
        showToast('Failed to update progress', 'error');
      }
    }

    // ============ ROUTER ============
    function router() {
      const { page, params } = getHashParams();
      const menu = document.getElementById('mobile-menu');
      if (menu) menu.remove();
      
      switch (page) {
        case 'landing': renderLanding(); break;
        case 'login': renderLogin(); break;
        case 'signup': renderSignup(); break;
        case 'dashboard': renderDashboard(); break;
        case 'practices': renderPractices(); break;
        case 'events': renderEvents(); break;
        case 'event-detail': renderEventDetail(); break;
        case 'retreats': renderRetreats(); break;
        case 'retreat-detail': renderRetreatDetail(); break;
        case 'community': renderCommunity(); break;
        case 'profile': renderProfile(); break;
        case 'pricing': renderPricing(); break;
        default: renderLanding();
      }
      
      window.scrollTo(0, 0);
    }

    // ============ INITIALIZATION ============
    async function init() {
      // Initialize Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities,
          mapToEditPanelValues
        });
      }
      
      // Initialize Data SDK
      if (window.dataSdk) {
        const result = await window.dataSdk.init(dataHandler);
        if (!result.isOk) {
          console.error('Failed to initialize Data SDK');
        }
      }
      
      currentUser = getUser();
      updateNav();
      
      window.addEventListener('hashchange', router);
      
      if (!window.location.hash) {
        window.location.hash = '#landing';
      } else {
        router();
      }
    }
